name: Build Tracker Mod

# Builds the Demon Tier Tracker Geode mod for every supported platform and
# combines them into a single multi-platform .geode file.
#
# Platforms produced:
#   - Windows  -> also what Linux players use through Steam Proton / Wine
#   - macOS
#   - Android (32-bit and 64-bit)
#
# Geometry Dash (and therefore Geode) has no native Linux build, so there is no
# separate Linux artifact: Linux users install the Windows .geode under Proton.

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "tracker-mod/**"
      - ".github/workflows/build-tracker-mod.yml"
  pull_request:
    paths:
      - "tracker-mod/**"
      - ".github/workflows/build-tracker-mod.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest

          - name: macOS
            os: macos-latest

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # The mod lives in a subdirectory of this repository.
          path: ./tracker-mod
          # 'latest' uses the most recent Geode SDK release. Pin to a specific
          # version here (e.g. '5.7.1') if you need to match mod.json exactly.
          sdk: latest
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ["build"]

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: demon-tier-tracker-geode
          path: ${{ steps.build.outputs.build-output }}
